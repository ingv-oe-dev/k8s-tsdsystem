apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - tsd-deployment.yaml
  - tsd-svc.yaml
  - tsd-ingress.yaml

namespace: tsdsystem-base

commonLabels:
  app: tsd-base

generatorOptions:
  labels:
    app: tsd-base

configMapGenerator:
- name: apache-custom-log
  files:
    - custom-log.conf

secretGenerator:
- name: tsd-secret
  behavior: create
  type: Opaque