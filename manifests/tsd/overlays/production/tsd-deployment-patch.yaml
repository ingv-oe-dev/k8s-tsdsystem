apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsdsystem-app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    spec:
      containers:
        - name: tsd-app
          resources:
            requests:
              cpu: "2"
              memory: "1024Mi"
            limits:
              cpu: "4"
              memory: "2048Mi"