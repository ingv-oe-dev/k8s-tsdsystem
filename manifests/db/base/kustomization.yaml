apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ns.yaml
  - timescale-ss.yaml
  - timescale-svc.yaml

namespace: tsdsystem-base

commonLabels:
  app: db-base

generatorOptions:
  labels:
    app: db-base
  disableNameSuffixHash: true

secretGenerator:
- name: tsd-db-secret
  behavior: create
  type: Opaque
